name: Container

on:
  pull_request:
    paths:
      - "Containerfile"
      - ".dockerignore"
      - "podman-compose.yml"
      - ".github/workflows/container.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "agent/**"
      - "bot/**"
      - "config/**"
      - "db/**"
      - "scheduler/**"
      - "alembic/**"
  # Push to main runs through cd.yml (workflow_call); the `github.event_name ==
  # 'push'` guards below still work there because a called workflow sees the
  # caller's event.
  workflow_call:

jobs:
  build-smoke-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build smoke image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Containerfile
          load: true
          tags: krisha-agent:test

      - name: Smoke runtime image
        run: >-
          docker run --rm --entrypoint sh krisha-agent:test -c
          'test "$(id -u)" = 1000 && python -c "import bot.app, scheduler.app"'

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/krisha-agent
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and Push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
