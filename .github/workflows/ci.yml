name: CI

# Push to main runs through cd.yml (which calls this workflow), so tests gate
# the deploy instead of racing it.
on:
  pull_request:
  workflow_call:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: krisha_test
          POSTGRES_USER: krisha_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U krisha_test -d krisha_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://krisha_test:test_password@localhost:5432/krisha_test
      TEST_DATABASE_URL: postgresql+asyncpg://krisha_test:test_password@localhost:5432/krisha_test
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8

      - name: Install dependencies
        run: uv sync --dev --locked

      - name: Verify migrations
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade -1
          uv run alembic upgrade head

      - name: Ruff
        run: uv run ruff check .

      - name: MyPy
        run: uv run mypy agent bot config db scheduler

      - name: Pytest
        run: >-
          uv run pytest
          --cov=agent --cov=bot --cov=config --cov=db --cov=scheduler
          --cov-report=term-missing --cov-fail-under=70
