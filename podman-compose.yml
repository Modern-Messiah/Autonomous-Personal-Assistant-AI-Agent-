x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10mb"

x-app-dependencies: &app-dependencies
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

services:
  postgres:
    image: docker.io/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB__NAME}
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB__USER} -d ${DB__NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: docker.io/redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS__PASSWORD:?REDIS__PASSWORD is required}
    command:
      - sh
      - -c
      - exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  migrate:
    image: localhost/krisha-agent:dev
    build:
      context: .
      dockerfile: Containerfile
    env_file:
      - .env
    command: ["alembic", "upgrade", "head"]
    depends_on: *app-dependencies
    restart: "no"
    logging: *default-logging

  bot:
    image: localhost/krisha-agent:dev
    build:
      context: .
      dockerfile: Containerfile
    env_file:
      - .env
    command: ["python", "-m", "bot"]
    depends_on: *app-dependencies
    restart: unless-stopped
    logging: *default-logging

  scheduler-producer:
    image: localhost/krisha-agent:dev
    build:
      context: .
      dockerfile: Containerfile
    env_file:
      - .env
    environment:
      SCHEDULER__RUNTIME: arq
    command: ["python", "-m", "scheduler"]
    depends_on: *app-dependencies
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging

  scheduler-worker:
    image: localhost/krisha-agent:dev
    build:
      context: .
      dockerfile: Containerfile
    env_file:
      - .env
    command: ["arq", "scheduler.arq_worker.WorkerSettings"]
    depends_on: *app-dependencies
    restart: unless-stopped
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
